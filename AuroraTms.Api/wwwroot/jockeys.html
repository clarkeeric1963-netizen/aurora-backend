<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora TMS — Jockeys</title>
<style>
  :root{--blue:#2563eb;--cyan:#0e7490;--bg:#eef1f5;--card:#fff;--border:#cbd5e1;--text:#0f172a;--muted:#64748b;--input:#f1f5f9;--ok:#059669;--okbg:#dcfce7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .brand{font-weight:800}.brand span{color:var(--muted);font-weight:600}
  .nav{display:flex;gap:14px;margin-left:18px}.nav a{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none}.nav a.active{color:var(--blue)}
  .tenantbox{margin-left:auto;display:flex;align-items:center;gap:8px}
  .tenantbox label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--input);font-size:13px;font-family:inherit;color:var(--text)}
  .wrap{max-width:900px;margin:22px auto;padding:0 16px}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  h2{font-size:17px;font-weight:800}.count{font-size:12px;color:var(--muted);font-weight:600}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start}
  .card.jockey{border-color:var(--blue)}
  .who{flex:1}
  .name{font-size:15px;font-weight:700}
  .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .tag{display:inline-block;margin-top:8px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--okbg);color:#166534}
  .toggle{border:1px solid var(--border);background:var(--card);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);white-space:nowrap}
  .toggle.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .qrbox{display:flex;gap:14px;align-items:center;margin-top:4px}
  .qr{width:128px;height:128px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px;flex-shrink:0}
  .qrinfo{font-size:12px;color:var(--muted)}
  .qrinfo .lnk{color:var(--blue);word-break:break-all;font-weight:600}
  .copy{margin-top:8px;border:1px solid var(--border);background:var(--card);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)}
  .state{padding:40px;text-align:center;color:var(--muted);font-size:14px}.state.err{color:#dc2626}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">A</div>
  <div class="brand">Aurora TMS <span>· Jockeys</span></div>
  <div class="nav"><a href="/orders.html">Orders</a><a href="/accounts.html">Accounts</a><a href="/jockeys.html" class="active">Jockeys</a></div>
  <div class="tenantbox">
    <label for="tenant">Tenant</label>
    <select id="tenant">
      <option value="sefl">sefl — Southeastern Freight Lines</option>
      <option value="gulfstates">gulfstates — Gulf States Logistics</option>
    </select>
  </div>
</div>

<div class="wrap">
  <div class="head"><h2>Yard jockeys</h2><span class="count" id="count"></span></div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Flag a person as yard-jockey capable to give them a QR code that opens the yard app scoped to them.</p>
  <div id="list"><div class="state">Loading…</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const TENANT_KEY = "aurora_tenant_demo";
  let drivers = [];
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function tenant(){ return $("tenant").value; }

  async function api(path, method, body){
    const res=await fetch(path,{method:method||"GET",headers:Object.assign({"X-Tenant":tenant()}, body?{"Content-Type":"application/json"}:{}),body:body?JSON.stringify(body):undefined});
    if(!res.ok){ const t=await res.text(); throw new Error(t||("Error "+res.status)); }
    const t=await res.text(); return t?JSON.parse(t):null;
  }

  function jockeyLink(d){
    return location.origin + "/yard.html?tenant=" + encodeURIComponent(tenant()) + "&jockey=" + encodeURIComponent(d.name||d.id);
  }

  function render(){
    if(!drivers.length){ $("list").innerHTML="<div class='state'>No drivers for this tenant.</div>"; return; }
    $("count").textContent = drivers.filter(d=>d.isYardJockey).length + " of " + drivers.length + " flagged";
    $("list").innerHTML="";
    drivers.forEach(d=>{
      const card=document.createElement("div");
      card.className="card"+(d.isYardJockey?" jockey":"");
      const left=document.createElement("div"); left.className="who";
      left.innerHTML="<div class='name'>"+esc(d.name)+"</div><div class='meta'>"+esc(d.id)+(d.homeTerminal?(" · "+esc(d.homeTerminal)):"")+" · "+esc(d.status||"")+"</div>"+(d.isYardJockey?"<span class='tag'>Yard jockey</span>":"");
      if(d.isYardJockey){
        const qrwrap=document.createElement("div"); qrwrap.className="qrbox";
        const qrdiv=document.createElement("div"); qrdiv.className="qr";
        const info=document.createElement("div"); info.className="qrinfo";
        const link=jockeyLink(d);
        info.innerHTML="Scan to open the yard app as <b>"+esc(d.name)+"</b>:<br><span class='lnk'>"+esc(link)+"</span>";
        const copy=document.createElement("button"); copy.className="copy"; copy.textContent="Copy link";
        copy.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(link); copy.textContent="Copied"; setTimeout(()=>copy.textContent="Copy link",1200); };
        info.appendChild(copy);
        qrwrap.appendChild(qrdiv); qrwrap.appendChild(info);
        left.appendChild(qrwrap);
        try{ new QRCode(qrdiv,{text:link,width:128,height:128,correctLevel:QRCode.CorrectLevel.M}); }catch(e){ qrdiv.textContent="QR unavailable"; }
      }
      const btn=document.createElement("button");
      btn.className="toggle"+(d.isYardJockey?" on":"");
      btn.textContent=d.isYardJockey?"Jockey ✓":"Make jockey";
      btn.onclick=()=>toggle(d, btn);
      card.appendChild(left); card.appendChild(btn);
      $("list").appendChild(card);
    });
  }

  async function toggle(d, btn){
    btn.disabled=true; const prev=btn.textContent; btn.textContent="…";
    try{
      const updated=Object.assign({}, d, { isYardJockey: !d.isYardJockey });
      await api("/api/drivers/"+d.id, "PUT", updated);
      await load();
    }catch(e){ alert("Couldn't update: "+e.message); btn.disabled=false; btn.textContent=prev; }
  }

  async function load(){
    $("list").innerHTML="<div class='state'>Loading…</div>";
    try{ drivers=await api("/api/drivers"); render(); }
    catch(e){ $("list").innerHTML="<div class='state err'>Couldn't load drivers: "+esc(e.message)+"</div>"; }
  }

  $("tenant").addEventListener("change",()=>{ try{localStorage.setItem(TENANT_KEY,tenant());}catch(e){} load(); });
  try{const t=localStorage.getItem(TENANT_KEY); if(t)$("tenant").value=t;}catch(e){}
  load();
</script>
</body>
</html>
