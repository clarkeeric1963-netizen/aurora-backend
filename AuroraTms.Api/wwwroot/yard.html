<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Smart Dock" />
<title>Smart Dock — Yard</title>
<style>
  :root{--blue:#2563eb;--cyan:#0e7490;--bg:#0f172a;--panel:#1e293b;--card:#fff;--border:#cbd5e1;--text:#0f172a;--muted:#64748b;--ok:#059669;--okbg:#dcfce7;--red:#dc2626;--redbg:#fee2e2;--amber:#b45309;--amberbg:#fef3c7}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#eef1f5;color:var(--text);min-height:100vh}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:#eef1f5;display:flex;flex-direction:column}
  .top{background:var(--bg);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:800}
  .ttl{font-weight:800;line-height:1.1}.ttl small{display:block;font-weight:500;font-size:11px;color:#94a3b8}
  .online{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#86efac}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
  .refresh{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:9px;font-size:18px;cursor:pointer}
  .sub{background:var(--panel);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:16px}
  .who{font-weight:600;font-size:14px}.who small{color:#94a3b8;font-weight:400;display:block;font-size:11px}
  .stats{margin-left:auto;display:flex;gap:14px}
  .stat b{font-size:18px;font-weight:800}.stat span{font-size:11px;color:#94a3b8;margin-left:3px}
  .list{padding:14px;display:flex;flex-direction:column;gap:12px;flex:1}
  .move{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px}
  .move.urgent{border-color:var(--red)}
  .move.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
  .chips{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:#dbeafe;color:#1d4ed8}
  .chip.u{background:var(--redbg);color:var(--red)}
  .chip.a{background:var(--amberbg);color:var(--amber)}
  .trailer{font-size:21px;font-weight:800;margin-bottom:8px}
  .lane{display:flex;align-items:center;gap:8px;font-size:15px;margin-bottom:10px}
  .lane .to{font-weight:700}.lane .ar{color:var(--muted)}
  .why{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .act{width:100%;height:52px;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .act.start{background:var(--blue);color:#fff}
  .act.start.sec{background:#fff;color:var(--text);border:1px solid var(--border)}
  .act.done{background:var(--ok);color:#fff}
  .act:disabled{opacity:.6}
  .state{padding:48px 20px;text-align:center;color:var(--muted)}
  .state.err{color:var(--red)}
  .donerow{font-size:12px;color:var(--muted);text-align:center;padding:6px 0 18px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">A</div>
    <div class="ttl">Smart Dock<small>Yard moves</small></div>
    <button class="refresh" id="refresh" aria-label="Refresh">&#x21bb;</button>
    <div class="online"><span class="dot"></span>Online</div>
  </div>
  <div class="sub">
    <div class="who" id="who">Jockey<small id="terminal">—</small></div>
    <div class="stats">
      <div class="stat"><b id="s_assigned">0</b><span>queued</span></div>
      <div class="stat"><b id="s_active">0</b><span>active</span></div>
      <div class="stat"><b id="s_done">0</b><span>done</span></div>
    </div>
  </div>
  <div class="list" id="list"><div class="state">Loading…</div></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  let TENANT = params.get("tenant") || (function(){ try{return localStorage.getItem("yard_tenant")}catch(e){return null} })() || "sefl";
  try{ localStorage.setItem("yard_tenant", TENANT); }catch(e){}

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function rank(m){ if(m.urgent)return 0; const p=(m.priority||"").toLowerCase(); if(p==="high")return 1; if(p==="low")return 3; return 2; }

  async function api(path, method, body){
    const res=await fetch(path,{method:method||"GET",headers:Object.assign({"X-Tenant":TENANT}, body?{"Content-Type":"application/json"}:{}),body:body?JSON.stringify(body):undefined});
    if(!res.ok){ const t=await res.text(); throw new Error(t||("Error "+res.status)); }
    const t=await res.text(); return t?JSON.parse(t):null;
  }

  function whyLine(m){ return [m.reason, m.manifest?("manifest "+m.manifest):null].filter(Boolean).map(esc).join(" &middot; "); }

  function card(m){
    const isActive = m.status==="In Progress";
    const cls = "move"+(isActive?" active":(m.urgent?" urgent":""));
    let chips="<span class='chip'>"+esc(m.type||"Move")+"</span>";
    if(isActive) chips+="<span class='chip a'>In progress</span>";
    else if(m.urgent) chips+="<span class='chip u'>&#9888; Urgent</span>";
    const btn = isActive
      ? "<button class='act done' onclick=\"complete('"+m.id+"',this)\">&#10003; Complete move</button>"
      : "<button class='act start"+(m.urgent?"":" sec")+"' onclick=\"start('"+m.id+"',this)\">&#9654; Start move</button>";
    return "<div class='"+cls+"'>"+
      "<div class='chips'>"+chips+"</div>"+
      "<div class='trailer'>"+esc(m.trailer||"—")+"</div>"+
      "<div class='lane'><span>"+esc(m.fromLoc||"—")+"</span><span class='ar'>&#8594;</span><span class='to'>"+esc(m.toLoc||"—")+"</span></div>"+
      "<div class='why'>"+whyLine(m)+"</div>"+ btn +"</div>";
  }

  async function load(){
    try{
      const all=await api("/api/yardmoves");
      const active=all.filter(m=>m.status==="Assigned"||m.status==="In Progress");
      const done=all.filter(m=>m.status==="Done");
      active.sort((a,b)=>{
        const ai=a.status==="In Progress"?0:1, bi=b.status==="In Progress"?0:1;
        if(ai!==bi)return ai-bi;
        return rank(a)-rank(b);
      });
      $("s_assigned").textContent=all.filter(m=>m.status==="Assigned").length;
      $("s_active").textContent=all.filter(m=>m.status==="In Progress").length;
      $("s_done").textContent=done.length;
      const jockey=(all.find(m=>m.jockey)||{}).jockey;
      $("who").firstChild.textContent = jockey || "Jockey";
      $("terminal").textContent = (all[0]&&all[0].terminalId)?("Terminal "+all[0].terminalId):("Tenant: "+TENANT);
      if(!active.length){ $("list").innerHTML="<div class='state'>&#10003; All caught up — no moves queued.</div>"+(done.length?"<div class='donerow'>"+done.length+" completed</div>":""); return; }
      $("list").innerHTML=active.map(card).join("")+(done.length?"<div class='donerow'>"+done.length+" completed today</div>":"");
    }catch(e){ $("list").innerHTML="<div class='state err'>Couldn't load moves: "+esc(e.message)+"</div>"; }
  }

  async function setStatus(id, status, btn){
    if(btn){ btn.disabled=true; btn.textContent="…"; }
    try{ await api("/api/yardmoves/"+id+"/status","PUT",{status:status}); await load(); }
    catch(e){ alert("Couldn't update: "+e.message); if(btn)btn.disabled=false; await load(); }
  }
  window.start = (id,btn)=>setStatus(id,"In Progress",btn);
  window.complete = (id,btn)=>setStatus(id,"Done",btn);

  $("refresh").addEventListener("click",load);
  load();
</script>
</body>
</html>
