<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora TMS — Users & roles</title>
<link rel="stylesheet" href="/aurora-theme.css" />
<style>
  html,body{height:100%}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .brand{font-weight:800}.brand span{color:var(--muted);font-weight:600}
  .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .out{font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .body{flex:1;display:flex;min-height:0}
  .list{width:280px;border-right:1px solid var(--border);overflow-y:auto;background:#fff;flex-shrink:0}
  .urow{display:flex;align-items:center;gap:11px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--slate-100)}
  .urow:hover{background:var(--slate-50)}.urow.sel{background:#eff6ff;box-shadow:inset 3px 0 0 var(--blue)}
  .ava{width:36px;height:36px;border-radius:50%;background:#e0e7ff;color:#3730a3;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .urow .nm{font-size:14px;font-weight:700}.urow .rl{font-size:12px;color:var(--muted)}
  .jbadge{margin-left:auto;width:9px;height:9px;border-radius:50%;background:var(--amber)}
  .editor{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
  .editor .empty{color:var(--muted);text-align:center;padding:60px}
  .sec{margin-bottom:18px;padding:18px}
  .sec h3{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--slate-600);margin-bottom:14px}
  .frow{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:8px 13px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;user-select:none}
  .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .chip.jockey.on{background:var(--amber);border-color:var(--amber)}
  .term{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--slate-100)}
  .term:last-child{border-bottom:none}
  .toggle{width:42px;height:24px;border-radius:20px;background:var(--slate-300);position:relative;cursor:pointer;flex-shrink:0;transition:.15s}
  .toggle.on{background:var(--blue)}
  .toggle i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
  .toggle.on i{left:21px}
  .term .tn{font-size:14px;font-weight:600}.term .tl{font-size:12px;color:var(--muted)}
  .qrbox{display:flex;gap:16px;align-items:center}
  .qr{width:128px;height:128px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px;flex-shrink:0}
  .qrinfo{font-size:12px;color:var(--muted)}.qrinfo .lnk{color:var(--blue);word-break:break-all;font-weight:600}
  .savebar{display:flex;align-items:center;gap:12px;margin-top:6px}
  .msg{font-size:13px;font-weight:600}.msg.ok{color:var(--green-700)}.msg.err{color:#dc2626}
  .new{padding:8px 14px}
</style>
</head>
<body class="a">
  <div class="a-topbar">
    <div class="brand">Aurora TMS <span>· Users &amp; roles</span></div>
    <div class="right">
      <select class="a-select new" id="tenant" style="width:auto"><option value="sefl">sefl</option><option value="gulfstates">gulfstates</option></select>
      <button class="a-btn a-btn-primary new" id="newUser">+ New user</button>
      <span class="out" id="logout">Log out</span>
    </div>
  </div>
  <div class="body">
    <div class="list" id="list"></div>
    <div class="editor" id="editor"><div class="empty">Select a user to edit their role, capabilities, and terminal access.</div></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/version-badge.js"></script>
<script>
  const $=id=>document.getElementById(id);
  const ROLES=["Company Admin","Terminal Manager","Dispatch Supervisor","Dock Coordinator","Billing Clerk","Check-In Clerk","Dispatcher","Yard Jockey","Operations Analyst","Dock","Driver"];
  const FEATURES=["Orders","Accounts","Dispatch","Yard","Drivers","Equipment","Manifest","Dock Ops","Billing","Reports","Settings"];
  let users=[], terminals=[], sel=null, draft=null;
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function tenant(){return $("tenant").value;}
  function initials(n){return (n||"?").split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();}
  function fkey(f){return f.toLowerCase().replace(/[^a-z]/g,"");}

  async function api(path,method,body){
    const res=await fetch(path,{method:method||"GET",headers:Object.assign({"X-Tenant":tenant()},body?{"Content-Type":"application/json"}:{}),body:body?JSON.stringify(body):undefined});
    if(res.status===401){ location.href="/admin/login.html"; throw new Error("Session expired"); }
    if(!res.ok){ const t=await res.text(); throw new Error(t||("Error "+res.status)); }
    const t=await res.text(); return t?JSON.parse(t):null;
  }

  function modulesOf(u){ let m=u.modules; if(typeof m==="string"){try{m=JSON.parse(m);}catch(e){m=null;}} return m||{}; }
  function termsOf(u){ let t=u.terminalAccess; if(typeof t==="string"){try{t=JSON.parse(t);}catch(e){t=null;}} return Array.isArray(t)?t:[]; }

  function renderList(){
    const l=$("list"); l.innerHTML="";
    if(!users.length){ l.innerHTML="<div class='empty' style='padding:30px;color:var(--muted)'>No users yet.</div>"; return; }
    users.forEach(u=>{
      const m=modulesOf(u);
      const r=document.createElement("div"); r.className="urow"+(sel&&sel.id===u.id?" sel":"");
      r.innerHTML="<div class='ava'>"+esc(initials(u.name))+"</div><div><div class='nm'>"+esc(u.name)+"</div><div class='rl'>"+esc(u.role||"No role")+"</div></div>"+(m.yardjockey?"<span class='jbadge' title='Yard jockey capable'></span>":"");
      r.onclick=()=>{ sel=u; draft=JSON.parse(JSON.stringify(u)); renderList(); renderEditor(); };
      l.appendChild(r);
    });
  }

  function renderEditor(){
    if(!draft){ $("editor").innerHTML="<div class='empty'>Select a user to edit their role, capabilities, and terminal access.</div>"; return; }
    const m=modulesOf(draft), grantedTerms=termsOf(draft);
    const featChips=FEATURES.map(f=>{const k=fkey(f);return "<span class='chip "+(m[k]?"on":"")+"' data-feat='"+k+"'>"+f+"</span>";}).join("");
    const termRows=terminals.length? terminals.map(t=>{
      const on=grantedTerms.includes(t.id);
      return "<div class='term'><div class='toggle "+(on?"on":"")+"' data-term='"+esc(t.id)+"'><i></i></div><div><div class='tn'>"+esc(t.name||t.id)+"</div><div class='tl'>"+esc([t.city,t.state].filter(Boolean).join(", "))+(t.docks?(" · "+t.docks+" docks"):"")+"</div></div></div>";
    }).join("") : "<div class='tl' style='color:var(--muted);font-size:13px'>No terminals found for this tenant.</div>";

    const isJockey=!!m.yardjockey;
    const link=location.origin+"/yard.html?tenant="+encodeURIComponent(tenant())+"&jockey="+encodeURIComponent(draft.name||draft.id);
    const qrSection=isJockey? "<div class='a-card sec'><h3>Yard jockey QR</h3><div class='qrbox'><div class='qr' id='qr'></div><div class='qrinfo'>Scan to open the yard app as <b>"+esc(draft.name)+"</b>:<br><span class='lnk'>"+esc(link)+"</span></div></div></div>" : "";

    $("editor").innerHTML=
      "<div class='a-card sec'><h3>Identity</h3><div class='frow'>"+
        "<div class='field'><label>Name</label><input class='a-input' id='f_name' value='"+esc(draft.name||"")+"'></div>"+
        "<div class='field'><label>Email</label><input class='a-input' id='f_email' value='"+esc(draft.email||"")+"'></div>"+
        "<div class='field'><label>Phone</label><input class='a-input' id='f_phone' value='"+esc(draft.phone||"")+"'></div>"+
        "<div class='field'><label>Status</label><select class='a-select' id='f_status'><option"+(draft.status==="Active"?" selected":"")+">Active</option><option"+(draft.status==="Inactive"?" selected":"")+">Inactive</option></select></div>"+
      "</div></div>"+
      "<div class='a-card sec'><h3>Primary role</h3><select class='a-select' id='f_role' style='max-width:340px'>"+ROLES.map(r=>"<option"+(draft.role===r?" selected":"")+">"+r+"</option>").join("")+"</select></div>"+
      "<div class='a-card sec'><h3>Capabilities</h3>"+
        "<div style='margin-bottom:12px'><span class='chip jockey "+(isJockey?"on":"")+"' data-feat='yardjockey'>&#9888; Yard Jockey capable</span></div>"+
        "<div style='font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px'>Feature visibility</div>"+
        "<div class='chips'>"+featChips+"</div></div>"+
      "<div class='a-card sec'><h3>Terminal access</h3>"+termRows+"</div>"+
      qrSection+
      "<div class='savebar'><button class='a-btn a-btn-primary' id='save'>Save profile</button><span class='msg' id='msg'></span></div>";

    document.querySelectorAll(".chip[data-feat]").forEach(c=>c.onclick=()=>{
      const k=c.getAttribute("data-feat"); const mm=modulesOf(draft); mm[k]=!mm[k]; draft.modules=mm; renderEditor();
    });
    document.querySelectorAll(".toggle[data-term]").forEach(t=>t.onclick=()=>{
      const id=t.getAttribute("data-term"); let arr=termsOf(draft); arr=arr.includes(id)?arr.filter(x=>x!==id):arr.concat([id]); draft.terminalAccess=arr; renderEditor();
    });
    ["f_name","f_email","f_phone"].forEach(id=>{const el=$(id); if(el)el.oninput=()=>{ draft[id.slice(2)]=el.value; };});
    $("f_status").onchange=e=>draft.status=e.target.value;
    $("f_role").onchange=e=>draft.role=e.target.value;
    $("save").onclick=save;
    if(isJockey){ try{ new QRCode($("qr"),{text:link,width:128,height:128,correctLevel:QRCode.CorrectLevel.M}); }catch(e){} }
  }

  async function save(){
    const msg=$("msg"); msg.className="msg"; msg.textContent="";
    if(!draft.name){ msg.className="msg err"; msg.textContent="Name is required."; return; }
    if(!draft.email){ msg.className="msg err"; msg.textContent="Email is required."; return; }
    $("save").disabled=true; $("save").textContent="Saving…";
    try{
      draft.tenantId=tenant();
      if(draft.__new){ draft.id="USR-"+Math.random().toString(36).slice(2,8).toUpperCase(); delete draft.__new; await api("/api/users","POST",draft); }
      else { await api("/api/users/"+draft.id,"PUT",draft); }
      msg.className="msg ok"; msg.textContent="Saved.";
      await load(); const again=users.find(u=>u.id===draft.id); if(again){ sel=again; draft=JSON.parse(JSON.stringify(again)); } renderList(); renderEditor();
    }catch(e){ msg.className="msg err"; msg.textContent=e.message; $("save").disabled=false; $("save").textContent="Save profile"; }
  }

  async function load(){
    try{ users=await api("/api/users"); }catch(e){ users=[]; }
    try{ terminals=await api("/api/terminals")||[]; }catch(e){ terminals=[]; }
    renderList();
  }

  $("newUser").onclick=()=>{ sel=null; draft={__new:true,name:"",email:"",role:"Yard Jockey",status:"Active",modules:{},terminalAccess:[]}; renderList(); renderEditor(); };
  $("logout").onclick=async()=>{ try{await fetch("/admin/logout",{method:"POST"});}catch(e){} location.href="/admin/login.html"; };
  $("tenant").onchange=()=>{ sel=null; draft=null; load(); renderEditor(); };
  load();
</script>
</body>
</html>
