<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora TMS — Admin sign in</title>
<style>
  :root{--blue:#2563eb;--cyan:#0e7490;--bg:#eef1f5;--card:#fff;--border:#bcc5d3;--text:#0f172a;--muted:#546580;--input:#e2e7ef;--red:#dc2626}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);
    color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:360px;
    box-shadow:0 8px 30px rgba(15,23,42,.08)}
  .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--cyan));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;margin-bottom:16px}
  h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
  p.sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  label{display:block;font-size:12px;font-weight:600;margin-bottom:6px}
  input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:9px;background:var(--input);
    font-size:14px;font-family:inherit;color:var(--text)}
  input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  button{margin-top:18px;width:100%;padding:12px;border:none;border-radius:9px;background:var(--blue);color:#fff;
    font-size:14px;font-weight:700;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:var(--red);font-size:13px;margin-top:12px;font-weight:600;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">A</div>
  <h1>Admin sign in</h1>
  <p class="sub">Aurora TMS platform administration</p>
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" />
  <button id="go">Sign in</button>
  <div class="err" id="err"></div>
</div>
<script>
  const pw = document.getElementById("pw");
  const go = document.getElementById("go");
  const err = document.getElementById("err");
  async function submit() {
    err.textContent = ""; go.disabled = true; go.textContent = "Signing in…";
    try {
      const res = await fetch("/admin/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw.value })
      });
      if (res.ok) { window.location.href = "/admin/index.html"; return; }
      const data = await res.json().catch(() => ({}));
      err.textContent = data.error || "Sign in failed.";
    } catch (e) {
      err.textContent = "Couldn't reach the server.";
    } finally { go.disabled = false; go.textContent = "Sign in"; }
  }
  go.addEventListener("click", submit);
  pw.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  pw.focus();
</script>
</body>
</html>
