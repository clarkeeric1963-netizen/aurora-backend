<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora TMS — Admin</title>
<style>
  :root{--blue:#2563eb;--cyan:#0e7490;--bg:#eef1f5;--card:#fff;--border:#cbd5e1;--text:#0f172a;--muted:#64748b;--input:#f1f5f9;--ok:#059669}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .bar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .brand{font-weight:800}.brand span{color:var(--muted);font-weight:600}
  .out{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;cursor:pointer}
  .wrap{max-width:920px;margin:24px auto;padding:0 16px;display:grid;gap:20px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
  h2{font-size:15px;font-weight:800;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--input);font-size:14px;font-family:inherit;color:var(--text)}
  input:focus,select:focus{outline:none;border-color:var(--blue)}
  .full{grid-column:1 / -1}
  .preview{font-size:12px;color:var(--muted);margin-top:6px}
  .preview b{color:var(--blue)}
  button{margin-top:14px;padding:10px 18px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:13px;font-weight:600;margin-top:10px;min-height:18px}
  .msg.ok{color:var(--ok)}.msg.err{color:#dc2626}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#dcfce7;color:#166534}
  .sub{color:var(--blue);font-weight:600}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">A</div>
  <div class="brand">Aurora TMS <span>· Admin</span></div>
  <a class="out" id="logout">Log out</a>
</div>

<div class="wrap">
  <div class="panel">
    <h2>Onboard a tenant</h2>
    <div class="grid">
      <div class="full"><label>Company name</label><input id="company" placeholder="Southeastern Freight Lines" /></div>
      <div><label>Subdomain</label><input id="subdomain" placeholder="sefl" /></div>
      <div><label>Tier</label>
        <select id="tier">
          <option value="starter">Starter</option>
          <option value="pro">Pro</option>
          <option value="pro-plus">Pro Plus</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>
      <div class="full preview">URL: <b id="urlpreview">subdomain.auroratms.com</b></div>
      <div><label>Contact name</label><input id="contact" placeholder="Jane Smith" /></div>
      <div><label>Email</label><input id="email" type="email" placeholder="jane@example.com" /></div>
      <div><label>Phone</label><input id="phone" placeholder="(555) 123-4567" /></div>
    </div>
    <button id="create">Create tenant</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="panel">
    <h2>Tenants</h2>
    <div id="list">Loading…</div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  async function api(path, method, body) {
    method = method || "GET";
    const res = await fetch(path, {
      method,
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined
    });
    if (res.status === 401) { window.location.href = "/admin/login.html"; throw new Error("Session expired"); }
    const text = await res.text();
    if (!res.ok) throw new Error(text || ("Error " + res.status));
    return text ? JSON.parse(text) : null;
  }

  $("subdomain").addEventListener("input", function () {
    const s = $("subdomain").value.trim().toLowerCase();
    $("urlpreview").textContent = (s || "subdomain") + ".auroratms.com";
  });

  $("logout").addEventListener("click", async function () {
    try { await fetch("/admin/logout", { method: "POST" }); } catch (e) {}
    window.location.href = "/admin/login.html";
  });

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[m]; }); }

  async function loadTenants() {
    try {
      const rows = await api("/api/customers");
      if (!rows || !rows.length) { $("list").innerHTML = "<p style='color:#64748b;font-size:13px'>No tenants yet.</p>"; return; }
      let html = "<table><tr><th>Company</th><th>URL</th><th>Tier</th><th>Status</th></tr>";
      for (const c of rows) {
        const url = c.subdomain ? c.subdomain + ".auroratms.com" : "—";
        html += "<tr><td>" + esc(c.company) + "</td><td class='sub'>" + esc(url) + "</td><td>" + esc(c.tier || "—") + "</td><td><span class='pill'>" + esc(c.status || "Active") + "</span></td></tr>";
      }
      html += "</table>";
      $("list").innerHTML = html;
    } catch (e) { $("list").innerHTML = "<p style='color:#dc2626;font-size:13px'>" + esc(e.message) + "</p>"; }
  }

  $("create").addEventListener("click", async function () {
    const msg = $("msg"); msg.className = "msg"; msg.textContent = "";
    const company = $("company").value.trim();
    if (!company) { msg.className = "msg err"; msg.textContent = "Company name is required."; return; }
    const body = {
      company: company,
      subdomain: $("subdomain").value.trim().toLowerCase() || null,
      tier: $("tier").value,
      contact: $("contact").value.trim() || null,
      email: $("email").value.trim() || null,
      phone: $("phone").value.trim() || null,
      status: "Active"
    };
    $("create").disabled = true; $("create").textContent = "Creating…";
    try {
      await api("/api/customers", "POST", body);
      msg.className = "msg ok"; msg.textContent = "Tenant created.";
      ["company","subdomain","contact","email","phone"].forEach(function (id) { $(id).value = ""; });
      $("urlpreview").textContent = "subdomain.auroratms.com";
      loadTenants();
    } catch (e) {
      msg.className = "msg err"; msg.textContent = e.message;
    } finally { $("create").disabled = false; $("create").textContent = "Create tenant"; }
  });

  loadTenants();
</script>
</body>
</html>
