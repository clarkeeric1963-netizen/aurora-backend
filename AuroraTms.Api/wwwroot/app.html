<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora TMS</title>
<link rel="stylesheet" href="/aurora-theme.css" />
<style>
  html,body{height:100%}
  body{display:flex;height:100vh;overflow:hidden}
  .side{width:248px;flex-shrink:0;display:flex;flex-direction:column}
  .side .top{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid #1e293b}
  .side .top b{font-weight:800;color:#fff;font-size:15px}
  .nav{flex:1;overflow-y:auto;padding:8px 0}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;color:var(--slate-300);border:none;background:none;width:100%;text-align:left;font-family:inherit}
  .navitem:hover{background:#1e293b;color:#fff}
  .navitem.active{background:#1e293b;color:#fff;box-shadow:inset 3px 0 0 var(--blue)}
  .navitem .lbl{flex:1}
  .navitem .ico-sm{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
  .navitem.notbuilt .ico-sm{opacity:.5}
  .navitem.notbuilt{color:#64748b}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dot.yellow{background:var(--amber)}
  .seclabel{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#475569;padding:14px 18px 4px}
  .legend{padding:12px 18px;border-top:1px solid #1e293b;font-size:11px;color:#64748b;line-height:1.6}
  .legend .d{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:5px}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .brand{font-weight:800}.brand span{color:var(--muted);font-weight:600}
  .content{flex:1;overflow:auto;position:relative;background:var(--bg)}
  iframe{width:100%;height:100%;border:none;display:none;background:#fff}
  iframe.show{display:block}
  .home{padding:26px;display:none}.home.show{display:block}
  .home h1{font-size:21px;font-weight:800;margin-bottom:4px}
  .home .sub{font-size:13px;color:var(--muted);margin-bottom:22px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px}
  .tile{padding:18px;cursor:pointer;border-left:4px solid var(--amber);display:flex;flex-direction:column;gap:12px}
  .tile.clear{border-left-color:var(--green)}
  .tile .row{display:flex;align-items:center;gap:12px}
  .tile .tname{font-size:15px;font-weight:700}
  .tile .tstat{font-size:12px;font-weight:700}
  .tile .tstat.warn{color:#92400e}.tile .tstat.none{color:var(--muted)}.tile .tstat.ok{color:#15803d}
  .placeholder{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--muted);padding:40px}
  .placeholder.show{display:flex}
  .placeholder .big{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px}
</style>
</head>
<body class="a">
  <div class="side a-sidebar">
    <div class="top"><div class="a-logo">A</div><b>Aurora TMS</b></div>
    <div class="nav" id="nav"></div>
    <div class="legend"><span class="d"></span>Yellow = needs build or sign-off.<br>Cleared when you say it's good.</div>
  </div>
  <div class="main">
    <div class="a-topbar"><div class="brand">Aurora TMS <span id="secname">· Home</span></div></div>
    <div class="content">
      <div class="home show" id="home">
        <h1>Welcome back</h1>
        <div class="sub">Your connected workspace. Yellow sections still need building or sign-off.</div>
        <div class="tiles" id="tiles"></div>
      </div>
      <iframe id="frame" title="Section"></iframe>
      <div class="placeholder" id="ph">
        <div class="big" id="phname">Not built yet</div>
        <div>This section is on the roadmap but hasn't been built yet.</div>
        <div class="a-badge a-badge-amber" style="margin-top:14px">Coming soon</div>
      </div>
    </div>
  </div>

<script src="/version-badge.js"></script>
<script>
  /* Build status. To CLEAR a section's yellow, set cleared:true (only when Eric says so). */
  const SECTIONS = [
    { id:"home",     label:"Home",            type:"home" },
    { id:"orders",   label:"Orders",          url:"/orders.html",      built:true,  cleared:false, group:"Operations", color:"blue",   ic:"O" },
    { id:"accounts", label:"Accounts",        url:"/accounts.html",    built:true,  cleared:false, group:"Operations", color:"purple", ic:"A" },
    { id:"yard",     label:"Yard app",        url:"/yard.html",        built:true,  cleared:false, group:"Operations", color:"amber",  ic:"Y" },
    { id:"users",    label:"Users & roles",   url:"/admin/users.html", built:true,  cleared:false, group:"Admin",      color:"green",  ic:"U" },
    { id:"loads",    label:"Loads / shipments", built:false, cleared:false, group:"Not built yet", color:"cyan",    ic:"L" },
    { id:"dispatch", label:"Dispatch",        built:false, cleared:false, group:"Not built yet", color:"orange",  ic:"D" },
    { id:"invoicing",label:"Invoicing",       built:false, cleared:false, group:"Not built yet", color:"pink",    ic:"I" },
    { id:"reports",  label:"Reports",         built:false, cleared:false, group:"Not built yet", color:"emerald", ic:"R" },
    { id:"fuel",     label:"Fuel surcharge",  built:false, cleared:false, group:"Not built yet", color:"red",     ic:"F" }
  ];
  const $ = id => document.getElementById(id);
  const frame=$("frame"), home=$("home"), ph=$("ph");
  function show(w){ home.classList.toggle("show",w==="home"); frame.classList.toggle("show",w==="frame"); ph.classList.toggle("show",w==="ph"); }

  function select(s, el){
    document.querySelectorAll(".navitem").forEach(n=>n.classList.remove("active"));
    if(el) el.classList.add("active");
    $("secname").textContent="· "+s.label;
    if(s.type==="home"){ show("home"); return; }
    if(s.built){ if(frame.src!==location.origin+s.url) frame.src=s.url; show("frame"); }
    else { $("phname").textContent=s.label; show("ph"); }
  }

  function buildNav(){
    const nav=$("nav"); let last=null;
    SECTIONS.forEach(s=>{
      if(s.group && s.group!==last){ const l=document.createElement("div"); l.className="seclabel"; l.textContent=s.group; nav.appendChild(l); last=s.group; }
      const b=document.createElement("button");
      b.className="navitem"+(s.built===false?" notbuilt":"");
      if(s.ic){ const i=document.createElement("span"); i.className="ico-sm a-ico-"+s.color; i.textContent=s.ic; b.appendChild(i); }
      const lbl=document.createElement("span"); lbl.className="lbl"; lbl.textContent=s.label; b.appendChild(lbl);
      if(s.type!=="home" && !s.cleared){ const d=document.createElement("span"); d.className="dot yellow"; d.title="Needs build or sign-off"; b.appendChild(d); }
      b.onclick=()=>select(s,b);
      nav.appendChild(b);
      if(s.type==="home") b.classList.add("active");
    });
  }

  function buildTiles(){
    const t=$("tiles");
    SECTIONS.filter(s=>s.type!=="home").forEach(s=>{
      const tile=document.createElement("div"); tile.className="a-card tile"+(s.cleared?" clear":"");
      let stat,cls;
      if(!s.built){ stat="Not built yet"; cls="none"; }
      else if(s.cleared){ stat="Live · signed off"; cls="ok"; }
      else { stat="Built · needs testing"; cls="warn"; }
      tile.innerHTML="<div class='row'><span class='a-ico a-ico-"+s.color+"'>"+s.ic+"</span><span class='tname'>"+s.label+"</span></div><div class='tstat "+cls+"'>"+stat+"</div>";
      tile.onclick=()=>{ const el=[...document.querySelectorAll(".navitem")].find(n=>n.querySelector(".lbl")&&n.querySelector(".lbl").textContent===s.label); select(s, el); };
      t.appendChild(tile);
    });
  }
  buildNav(); buildTiles();
</script>
</body>
</html>
